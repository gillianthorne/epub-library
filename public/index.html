<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gillian's Library App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Welcome to <span class="display-name">Gillian</span>'s Library</h1>
        <button class="hamburger" aria-label="Toggle navigation">&#9776;</button>
        <nav class="main-nav">
            <ul>
                <li><a href="#" data-page="books">Browse Books</a></li>
                <li><a href="#" data-page="authors">Browse Authors</a></li>
                <li><a href="#" data-page="genres">Browse Book Genres</a></li>
                <li><a href="#" data-page="tags">Browse Fanfiction Tags</a></li>
                <li><a href="#" data-page="shelf">My Shelf</a></li>
                <li><a href="#" data-page="tbr">My TBR</a></li>
                <li><a href="#" data-page="logout">Logout</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <div id="app">
            <div class="book">
                <img src="covers/a_question_of_holmes.jpg" class="cover">
                <div class="details">
                    <h2 class="title"><a href="#">This shouldn't be showing up</a></h2>
                    <p class="author"><a href="#">Brittany Cavallaro</a></p>
                    <div class="genres">Genres: 
                        <ul class="genre-list">
                            <li><a href="#">genre 1</a></li>
                            <li><a href="#">genre 2</a></li>
                            <li><a href="#">genre 3</a></li>
                        </ul>
                    </div>
                    <p class="status">Status: <span class="reading-status">unread</span><span class="extra"> - started/last finished goes here</span></p>
                </div>
                <button class="tbr-btn" aria-label="Add to TBR">
                    <svg width="40" height="44" viewBox="0 0 46 44" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M23 0L28.1436 15.8291H44.7932L31.3248 25.6118L36.4684 41.4409L23 31.6582L9.53157 41.4409L14.6752 25.6118L1.20677 15.8291H17.8564L23 0Z" fill="#aaaaaa"/>
                    </svg>
                </button>
            </div>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
